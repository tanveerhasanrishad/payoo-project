<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Payoo | Home</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon" />

    <!-- Tailwind and DaisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Icons from FontAwesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <style>
      * {
        font-family: "Outfit", sans-serif;
      }
    </style>
  </head>
  <body class="min-h-screen max-w-md bg-base-200 mx-auto">
    <!-- Header Part -->
    <header class="border-b-2 border-gray-300 sticky top-0 bg-base-200 z-10">
      <section class="w-11/12 mx-auto py-3 flex justify-between items-center">
        <div class="left flex gap-1">
          <div class="logo w-[60px]">
            <img src="./assets/logo.png" alt="" />
          </div>
          <div class="balance-info">
            <h2 class="text-2xl font-bold">
              $ <span id="balance">45000</span>
            </h2>
            <p class="text-neutral/50">Available Balance</p>
          </div>
        </div>
        <div class="right">
          <a href="./index.html" class="btn btn-soft text-neutral/60">
            <i class="fa-solid fa-arrow-right-from-bracket"></i>Log Out
          </a>
        </div>
      </section>
    </header>

    <!-- Welcome Massage -->
    <section class="w-11/12 mx-auto py-10 space-y-5">
      <h2 class="text-3xl font-bold">
        Welcome to Pay<span class="text-primary">oo</span>
      </h2>
      <p class="text-neutral/50">
        Enjoy easy and convenient financial services with us. Cashout charge is
        low and
      </p>

      <!-- Main Page Buttons -->
      <div class="buttons grid grid-cols-3 gap-3">
        <button
          onclick="showOnly('add-money')"
          class="btn flex-col h-full py-4 btn-primary btn-soft"
        >
          <img src="./assets/opt-1.png" alt="" />
          <p>Add Money</p>
        </button>
        <button
          onclick="showOnly('cashout')"
          class="btn flex-col h-full py-4 btn-primary btn-soft"
        >
          <img src="./assets/opt-2.png" alt="" />
          <p>Cashout</p>
        </button>
        <button
          onclick="showOnly('transfer-money')"
          class="btn flex-col h-full py-4 btn-primary btn-soft"
        >
          <img src="./assets/opt-3.png" alt="" />
          <p>Transfer Money</p>
        </button>
        <button
          onclick="showOnly('get-bonus')"
          class="btn flex-col h-full py-4 btn-primary btn-soft"
        >
          <img src="./assets/opt-4.png" alt="" />
          <p>Get Bonus</p>
        </button>
        <button class="btn flex-col h-full py-4 btn-primary btn-soft">
          <img src="./assets/opt-5.png" alt="" />
          <p>Pay Bill</p>
        </button>
        <button
          onclick="showOnly('history')"
          class="btn flex-col h-full py-4 btn-primary btn-soft"
        >
          <img src="./assets/opt-6.png" alt="" />
          <p>Transactions</p>
        </button>
      </div>
    </section>

    <!-- Add Money Option -->
    <section id="add-money" class="w-11/12 mx-auto py-5 hidden">
      <h2 class="text-xl font-bold mb-5">Add Money</h2>
      <div class="card bg-base-100 w-full shadow rounded-2xl">
        <div class="card-body">
          <fieldset class="fieldset">
            <label class="label font-medium text-neutral">Select A Bank</label>
            <select
              id="add-money-bank"
              class="select w-full bg-base-200 rounded-full"
            >
              <option disabled selected>Select Bank</option>
              <option value="DBBL">DBBL</option>
              <option value="IBBL">IBBL</option>
              <option value="CITY">City Bank</option>
            </select>

            <br />

            <label class="label font-medium text-neutral"
              >Bank Account Number</label
            >
            <input
              id="add-money-number"
              type="text"
              class="input w-full rounded-full bg-base-200"
              placeholder="Enter 11 digit account number"
            />
            <br />
            <label class="label font-medium text-neutral">Amount to Add</label>
            <input
              id="add-money-amount"
              type="number"
              class="input w-full rounded-full bg-base-200"
              placeholder="Enter Amount to Add"
            />
            <br />
            <label class="label font-medium text-neutral">Pin Number</label>
            <input
              id="add-money-pin"
              maxlength="4"
              minlength="4"
              type="password"
              class="input w-full rounded-full bg-base-200"
              placeholder="Enter 4 Digit Pin"
            />
            <div></div>
            <button
              id="add-money-btn"
              class="btn btn-primary mt-4 rounded-full"
            >
              Add Money
            </button>
          </fieldset>
        </div>
      </div>
    </section>

    <!-- Cashout Option -->
    <section id="cashout" class="w-11/12 mx-auto py-5">
      <h2 class="text-xl font-bold mb-5">Cashout</h2>
      <div class="card bg-base-100 w-full shadow rounded-2xl">
        <div class="card-body">
          <fieldset class="fieldset">
            <label class="label font-medium text-neutral">Agent Number</label>
            <input
              id="cashout-number"
              type="text"
              class="input w-full rounded-full bg-base-200"
              placeholder="Enter Agent 11 Digit Number"
            />
            <br />
            <label class="label font-medium text-neutral">Amount</label>
            <input
              id="cashout-amount"
              type="number"
              class="input w-full rounded-full bg-base-200"
              placeholder="Enter Amount to withdraw"
            />
            <br />
            <label class="label font-medium text-neutral">Pin Number</label>
            <input
              id="cashout-pin"
              maxlength="4"
              minlength="4"
              type="password"
              class="input w-full rounded-full bg-base-200"
              placeholder="Enter 4 Digit Pin"
            />
            <div></div>
            <button id="cashout-btn" class="btn btn-primary mt-4 rounded-full">
              Withdraw Money
            </button>
          </fieldset>
        </div>
      </div>
    </section>

    <!-- Transfer Money Option -->
    <section id="transfer-money" class="w-11/12 mx-auto py-5 hidden">
      <h2 class="text-xl font-bold mb-5">Transfer Money</h2>
      <div class="card bg-base-100 w-full shadow rounded-2xl">
        <div class="card-body">
          <fieldset class="fieldset">
            <label class="label font-medium text-neutral"
              >User Account Number</label
            >
            <input
              id="transfer-number"
              type="text"
              class="input w-full rounded-full bg-base-200"
              placeholder="Enter 11 digit number"
            />
            <br />
            <label class="label font-medium text-neutral">Amount</label>
            <input
              id="transfer-amount"
              type="number"
              class="input w-full rounded-full bg-base-200"
              placeholder="Enter amount to transfer"
            />
            <br />
            <label class="label font-medium text-neutral">Pin Number</label>
            <input
              id="transfer-pin"
              maxlength="4"
              minlength="4"
              type="password"
              class="input w-full rounded-full bg-base-200"
              placeholder="Enter 4 Digit Pin"
            />
            <div></div>
            <button id="transfer-btn" class="btn btn-primary mt-4 rounded-full">
              Send Now
            </button>
          </fieldset>
        </div>
      </div>
    </section>

    <!-- Get Bonus Option -->
    <section id="get-bonus" class="w-11/12 mx-auto py-5 hidden">
      <h2 class="text-xl font-bold mb-5">Get Bonus</h2>
      <div class="card bg-base-100 w-full shadow rounded-2xl">
        <div class="card-body">
          <fieldset class="fieldset">
            <label class="label font-medium text-neutral"
              >Enter Bonus Coupon</label
            >
            <input
              id="coupon-number"
              type="text"
              class="input w-full rounded-full bg-base-200"
              placeholder="Enter your coupon"
            />
            <button id="bonus-btn" class="btn btn-primary mt-4 rounded-full">
              Get Bonus
            </button>
          </fieldset>
        </div>
      </div>
    </section>

    <!-- Transaction History Option -->
    <section id="history" class="w-11/12 mx-auto py-5 hidden">
      <h2 class="text-xl font-bold mb-5">Transaction History</h2>
      <div class="space-y-5" id="history-container"></div>
    </section>

    <script src="./script/machine.js"></script>
    <script src="./script/addMoney.js"></script>
    <script src="./script/cashout.js"></script>
    <script src="./script/transfer.js"></script>
    <script src="./script/bonus.js"></script>
  </body>
</html>
